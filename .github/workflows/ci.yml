name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Ruff check
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run core tests
        run: pytest tests/ -v --tb=short -m "not integration"

  test-interop:
    name: Test Interop (Qiskit + Aer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"
          uv pip install --system "qiskit>=1.0" "qiskit-aer>=0.14"

      - name: Run all tests (including interop)
        run: pytest tests/ -v --tb=short --cov=quantsdk --cov-report=term-missing

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: mypy
        run: mypy src/quantsdk/ --ignore-missing-imports

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"
          uv pip install --system pip-audit bandit

      - name: Dependency audit (pip-audit)
        run: pip-audit --strict --desc

      - name: Static security scan (bandit)
        run: bandit -r src/quantsdk/ -c pyproject.toml -f json -o bandit-report.json || true

      - name: Bandit human-readable report
        run: bandit -r src/quantsdk/ -c pyproject.toml -ll

      - name: Check for secrets in code
        run: |
          echo "Scanning for potential secrets..."
          ! grep -rn --include='*.py' -E '(password|secret|api_key|token)\s*=\s*["'\'']\''.{8,}["'\'']\'''' src/ || echo "No hardcoded secrets found ✅"
